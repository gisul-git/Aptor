<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Workspace Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 20px 30px;
            border-bottom: 2px solid #e5e7eb;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h2 {
            font-size: 24px;
            margin: 0;
        }
        .header .subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-top: 5px;
        }
        .header .file-id {
            font-size: 13px;
            color: #059669;
            font-family: monospace;
            font-weight: bold;
            margin-top: 8px;
            background: #d1fae5;
            padding: 6px 12px;
            border-radius: 6px;
            border: 2px solid #10b981;
        }
        .timer {
            text-align: right;
        }
        .timer .label {
            font-size: 12px;
            color: #6b7280;
        }
        .timer .time {
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
        }
        .submit-btn {
            padding: 12px 24px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 20px;
        }
        .submit-btn:hover {
            background: #059669;
        }
        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 320px;
            padding: 20px;
            border-right: 2px solid #e5e7eb;
            overflow-y: auto;
            background: #f9fafb;
        }
        .sidebar h3 {
            font-size: 18px;
            margin-bottom: 12px;
        }
        .sidebar p {
            font-size: 14px;
            line-height: 1.6;
            color: #374151;
        }
        .sidebar ul {
            font-size: 13px;
            line-height: 1.8;
            color: #374151;
            padding-left: 20px;
        }
        .workspace-info {
            margin-top: 30px;
            padding: 16px;
            background: #dbeafe;
            border-radius: 8px;
            border: 2px solid #3b82f6;
        }
        .workspace-info h4 {
            margin: 0 0 12px 0;
            font-size: 14px;
            color: #1e40af;
            font-weight: bold;
        }
        .workspace-info p {
            font-size: 12px;
            color: #1e3a8a;
            margin: 8px 0;
        }
        .file-id-box {
            font-family: monospace;
            font-size: 11px;
            word-break: break-all;
            background: white;
            padding: 8px;
            border-radius: 4px;
            margin-top: 4px;
        }
        .workspace-container {
            flex: 1;
            background: #1f2937;
            position: relative;
        }
        .workspace-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            flex-direction: column;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #e5e7eb;
            border-top: 5px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-text {
            margin-top: 20px;
            font-size: 18px;
            color: #666;
        }
        .error {
            padding: 40px;
            text-align: center;
        }
        .error h1 {
            color: #dc2626;
        }
        .error p {
            font-size: 18px;
            color: #666;
            margin: 20px 0;
        }
        .retry-btn {
            padding: 12px 24px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">
            <div class="spinner"></div>
            <p class="loading-text">Initializing workspace...</p>
        </div>
    </div>

    <script>
        let question = null;
        let workspace = null;

        async function init() {
            try {
                updateStatus('Generating question...');
                
                const qRes = await fetch('http://localhost:3006/api/v1/design/questions/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        role: 'ui_designer',
                        difficulty: 'intermediate',
                        task_type: 'dashboard',
                        topic: 'food delivery',
                        created_by: 'test'
                    })
                });
                
                if (!qRes.ok) throw new Error('Question generation failed');
                question = await qRes.json();
                
                updateStatus('Creating workspace...');
                
                const wRes = await fetch('http://localhost:3006/api/v1/design/workspace/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: 'test_' + Date.now(),
                        assessment_id: 'test_assessment',
                        question_id: question._id || question.id
                    })
                });
                
                if (!wRes.ok) throw new Error('Workspace creation failed');
                workspace = await wRes.json();
                
                renderWorkspace();
                
            } catch (err) {
                showError(err.message);
            }
        }

        function updateStatus(text) {
            document.querySelector('.loading-text').textContent = text;
        }

        function showError(message) {
            document.getElementById('app').innerHTML = `
                <div class="error">
                    <h1>❌ Error</h1>
                    <p>${message}</p>
                    <button class="retry-btn" onclick="location.reload()">Retry</button>
                </div>
            `;
        }

        function renderWorkspace() {
            const fileId = workspace.file_id || 'N/A';
            const fileIdShort = fileId !== 'N/A' && fileId.length > 12 ? fileId.slice(-12) : fileId;
            const constraints = question.constraints || [];
            
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <div>
                        <h2>${question.title || 'Design Challenge'}</h2>
                        <p class="subtitle">${question.role || 'Designer'} • ${question.difficulty || 'Intermediate'}</p>
                        <p class="file-id">🔒 File ID: ${fileIdShort}</p>
                    </div>
                    <div style="display: flex; align-items: center;">
                        <div class="timer">
                            <p class="label">Time Remaining</p>
                            <p class="time">60:00</p>
                        </div>
                        <button class="submit-btn" onclick="alert('Submitted!')">Submit</button>
                    </div>
                </div>
                
                <div class="main-content">
                    <div class="sidebar">
                        <h3>📋 Challenge</h3>
                        <p>${question.description || 'Loading...'}</p>
                        
                        <h3 style="margin-top: 24px;">⚠️ Constraints</h3>
                        <ul>
                            ${constraints.map(c => `<li>${c}</li>`).join('') || '<li>No constraints</li>'}
                        </ul>
                        
                        <div class="workspace-info">
                            <h4>🔒 Workspace Info</h4>
                            <p><strong>User:</strong> ${workspace.user_id || 'test_user'}</p>
                            <p><strong>File ID:</strong></p>
                            <div class="file-id-box">${fileId}</div>
                            <p style="margin-top: 12px; color: #059669; font-weight: bold;">✓ Isolated workspace</p>
                        </div>
                    </div>
                    
                    <div class="workspace-container">
                        <iframe
                            src="${workspace.workspace_url || 'http://localhost:9001'}"
                            title="Penpot Workspace"
                            allow="clipboard-read; clipboard-write; fullscreen"
                        ></iframe>
                    </div>
                </div>
            `;
        }

        // Start initialization
        init();
    </script>
</body>
</html>
