name: Build and Deploy AI Assessment Service to Azure Container Apps

on:
  push:
    branches: [dev]
    paths:
      - 'services/ai-assessment-service/**'
      - '.github/workflows/deploy-ai-assessment-service.yml'
  pull_request:
    types: [closed]
    branches: [dev]
    paths:
      - 'services/ai-assessment-service/**'
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: Aaptor
  CONTAINER_APP_NAME: ai-assessment-service
  DOCKER_IMAGE_NAME: ai-assessment-service
  SERVICE_PATH: services/ai-assessment-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure Container Apps extension
        run: az extension add --name containerapp --upgrade

      - name: Login to ACR
        run: |
          echo ${{ secrets.ACR_PASSWORD }} | docker login \
            ${{ secrets.ACR_LOGIN_SERVER }} \
            -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build Docker image
        working-directory: ./${{ env.SERVICE_PATH }}
        run: |
          docker build \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:latest \
            .

      - name: Push image to ACR
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:latest

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

      - name: Verify deployment
        run: echo "✅ AI Assessment Service deployed successfully"