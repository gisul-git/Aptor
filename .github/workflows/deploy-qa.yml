name: Deploy to QA VM

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types:
      - completed

env:
  VM_HOST: ${{ secrets.QA_VM_HOST }}
  VM_USER: ${{ secrets.QA_VM_USER }}
  VM_SSH_KEY: ${{ secrets.QA_VM_SSH_KEY }}

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${VM_SSH_KEY}" > ~/.ssh/key
          chmod 600 ~/.ssh/key
          ssh-keyscan -H ${VM_HOST} >> ~/.ssh/known_hosts

      - name: Deploy on VM
        run: |
          ssh -i ~/.ssh/key ${VM_USER}@${VM_HOST} << 'EOF'
            set -e

            echo "Pulling latest images..."
            cd /opt/aptor

            docker compose pull

            echo "Restarting services..."
            docker compose up -d

            echo "Cleaning old images..."
            docker image prune -f

            echo "Deployment complete"
          EOF