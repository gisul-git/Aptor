name: Deploy All Services to QA (Debian VM)

on:
  push:
    branches:
      - QA
  pull_request:
    types: [closed]
    branches:
      - QA
  workflow_dispatch: # Allow manual triggerings

env:
  VM_HOST: ${{ secrets.QA_VM_HOST }}
  VM_USER: ${{ secrets.QA_VM_USER }}
  VM_SSH_KEY: ${{ secrets.QA_VM_SSH_KEY }}
  VM_DEPLOY_PATH: ${{ secrets.QA_VM_DEPLOY_PATH }}

jobs:
  deploy-to-qa-vm:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: QA

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.VM_HOST }} >> ~/.ssh/known_hosts
      - name: Deploy to Debian VM
        run: |
          DEPLOY_PATH="${{ env.VM_DEPLOY_PATH }}"
          if [ -z "$DEPLOY_PATH" ]; then
            DEPLOY_PATH="/opt/aptor"
          fi
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.VM_USER }}@${{ env.VM_HOST }} bash << EOF
            set -e
            
            echo "🚀 Starting QA deployment..."
            
            # Navigate to deployment directory
            cd ${DEPLOY_PATH}
            
            # Sync workspace with QA branch
            echo "📥 Syncing workspace with QA branch..."
            
            # Backup critical files
            echo "💾 Backing up critical files..."
            if [ -f .env ]; then
              cp .env .env.backup
              echo "✅ .env backed up"
            fi
            
            # Fetch and checkout latest changes - handle local changes
            echo "🔄 Updating code from repository..."
            
            # Clean up stale Git refs to prevent locking errors
            echo "🧹 Cleaning up stale Git references..."
            git remote prune origin || true
            rm -rf .git/refs/remotes/origin/* || true
            
            # Fetch with prune to clean up stale refs
            echo "📥 Fetching latest changes..."
            git fetch origin --prune --force || {
              echo "⚠️  Fetch with prune failed, trying regular fetch..."
              git fetch origin || {
                echo "⚠️  Regular fetch failed, cleaning refs and retrying..."
                rm -rf .git/refs/remotes/origin/* || true
                git fetch origin
              }
            }
            
            # Stash or discard local changes to allow pull
            if [ -n "$(git status --porcelain)" ]; then
              echo "⚠️  Local changes detected, stashing them..."
              git stash push -m "Auto-stash before deployment $(date +%Y%m%d_%H%M%S)" || true
            fi
            
            # Reset to remote QA branch to ensure clean state
            git checkout QA
            git reset --hard origin/QA || {
              echo "⚠️  Reset failed, trying pull..."
              git pull origin QA --no-edit || {
                echo "⚠️  Pull failed, cleaning refs and forcing reset..."
                git remote prune origin || true
                rm -rf .git/refs/remotes/origin/* || true
                git fetch origin --prune --force
                git reset --hard origin/QA
              }
            }
            
            echo "✅ Code updated to latest QA branch"
            
            # Ensure .env file exists
            if [ ! -f .env ]; then
              echo "❌ ERROR: .env file not found after git operations!"
              echo "⚠️  Deployment cannot proceed without .env file."
              exit 1
            else
              echo "✅ .env file verified"
            fi
            
            # Preserve aiml-agent-service - ensure it stays running
            echo "🔒 Preserving aiml-agent-service..."
            AIML_AGENT_RUNNING=false
            if docker compose ps aiml-agent-service 2>/dev/null | grep -q "Up"; then
              AIML_AGENT_RUNNING=true
              echo "✅ aiml-agent-service is running, will preserve it"
            fi
            
            # Stop and remove existing containers properly
            echo "🛑 Stopping existing containers..."
            docker compose down --timeout 10 --remove-orphans 2>/dev/null || true
            
            # Force remove any containers that compose knows about
            echo "🛑 Force removing containers with docker-compose rm..."
            docker compose rm -f 2>/dev/null || true
            
            # Wait for containers to be fully stopped
            sleep 2
            
            # Force stop and remove any remaining containers by name pattern (including Created state)
            echo "🛑 Force stopping and removing any remaining containers..."
            for container in gisul-frontend gisul-api-gateway gisul-auth-service \
                            gisul-ai-assessment-service gisul-custom-mcq-service \
                            gisul-aiml-service gisul-dsa-service gisul-proctoring-service \
                            gisul-super-admin-service gisul-employee-service gisul-demo-service gisul-redis; do
              # Try multiple times to ensure removal
              for attempt in 1 2 3; do
                if docker ps -a --format "{{.Names}}" | grep -q "^${container}$"; then
                  echo "Attempt $attempt: Removing container (any state): ${container}"
                  docker stop "${container}" 2>/dev/null || true
                  docker rm -f "${container}" 2>/dev/null || true
                  sleep 0.5
                else
                  break
                fi
              done
            done
            
            # Remove any orphaned containers with our naming pattern (catch-all, including Created state)
            echo "🧹 Removing any orphaned containers (including Created state)..."
            # Use a more reliable method - get all IDs first, then remove
            container_ids=$(docker ps -a --filter "name=gisul-" --format "{{.ID}} {{.Names}}" | grep -v "gisul-aiml-agent-service" | awk '{print $1}' | tr '\n' ' ')
            if [ -n "$container_ids" ]; then
              echo "Found containers to remove: $container_ids"
              for id in $container_ids; do
                if [ -n "$id" ]; then
                  name=$(docker ps -a --filter "id=$id" --format "{{.Names}}")
                  echo "Removing orphaned container: $name ($id)"
                  docker rm -f "$id" 2>/dev/null || true
                fi
              done
            fi
            
            # Specifically remove containers in "Created" state that might not be caught above
            echo "🧹 Removing containers in Created state..."
            created_ids=$(docker ps -a --filter "status=created" --filter "name=gisul-" --format "{{.ID}} {{.Names}}" | grep -v "gisul-aiml-agent-service" | awk '{print $1}' | tr '\n' ' ')
            if [ -n "$created_ids" ]; then
              echo "Found Created containers to remove: $created_ids"
              for id in $created_ids; do
                if [ -n "$id" ]; then
                  name=$(docker ps -a --filter "id=$id" --format "{{.Names}}")
                  echo "Removing Created container: $name ($id)"
                  docker rm -f "$id" 2>/dev/null || true
                fi
              done
            fi
            
            # Verify all containers are removed - more aggressive approach
            echo "✅ Verifying cleanup..."
            sleep 2
            remaining_ids=$(docker ps -a --filter "name=gisul-" --format "{{.ID}} {{.Names}}" | grep -v "gisul-aiml-agent-service" | awk '{print $1}' | tr '\n' ' ')
            if [ -n "$remaining_ids" ]; then
              echo "⚠️  Warning: Some containers still exist, force removing by ID..."
              for id in $remaining_ids; do
                if [ -n "$id" ]; then
                  name=$(docker ps -a --filter "id=$id" --format "{{.Names}}")
                  echo "Force removing remaining container: $name ($id)"
                  docker stop "$id" 2>/dev/null || true
                  docker rm -f "$id" 2>/dev/null || true
                fi
              done
              sleep 1
            fi
            
            # Cleanup old images
            echo "🧹 Cleaning up old Docker images..."
            docker system prune -f || true
            
            # Final verification - ensure no conflicting containers exist
            echo "🔍 Final verification before build..."
            conflicting_ids=$(docker ps -a --filter "name=gisul-" --format "{{.ID}} {{.Names}}" | grep -v "gisul-aiml-agent-service" | grep -E "(gisul-frontend|gisul-api-gateway|gisul-auth-service|gisul-ai-assessment-service|gisul-custom-mcq-service|gisul-aiml-service|gisul-dsa-service|gisul-proctoring-service|gisul-super-admin-service|gisul-employee-service|gisul-demo-service|gisul-redis)" | awk '{print $1}' | tr '\n' ' ')
            if [ -n "$conflicting_ids" ]; then
              echo "❌ ERROR: Conflicting containers still exist, force removing by ID..."
              for id in $conflicting_ids; do
                if [ -n "$id" ]; then
                  name=$(docker ps -a --filter "id=$id" --format "{{.Names}}")
                  echo "Force removing conflicting container: $name ($id)"
                  docker stop "$id" 2>/dev/null || true
                  docker rm -f "$id" 2>/dev/null || true
                fi
              done
              sleep 2
            fi
            
            # Final cleanup right before build - remove ALL containers by ID to be absolutely sure
            echo "🧹 Final aggressive cleanup before build..."
            final_cleanup_ids=$(docker ps -a --filter "name=gisul-" --format "{{.ID}} {{.Names}}" | grep -v "gisul-aiml-agent-service" | awk '{print $1}' | tr '\n' ' ')
            if [ -n "$final_cleanup_ids" ]; then
              echo "Found containers for final cleanup: $final_cleanup_ids"
              for id in $final_cleanup_ids; do
                if [ -n "$id" ]; then
                  name=$(docker ps -a --filter "id=$id" --format "{{.Names}}")
                  echo "Force removing container ID: $id (name: $name)"
                  docker stop "$id" 2>/dev/null || true
                  docker rm -f "$id" 2>/dev/null || true
                fi
              done
              sleep 1
            fi
            
            # Remove network if it exists (will be recreated) - more aggressive cleanup
            echo "🧹 Cleaning up network..."
            # Find the actual network name (Docker Compose may prefix it with directory name)
            NETWORK_NAME=$(docker network ls --format "{{.Name}}" | grep -E "(aptor|gisul).*microservices-network" | head -1 || echo "")
            if [ -z "$NETWORK_NAME" ]; then
              # Try common variations
              if docker network inspect aptor_microservices-network >/dev/null 2>&1; then
                NETWORK_NAME="aptor_microservices-network"
              elif docker network inspect aptor-microservices-network >/dev/null 2>&1; then
                NETWORK_NAME="aptor-microservices-network"
              fi
            fi
            
            # Disconnect all containers from network first (including aiml-agent-service)
            if [ -n "$NETWORK_NAME" ] && docker network inspect "$NETWORK_NAME" >/dev/null 2>&1; then
              echo "Disconnecting all containers from network: $NETWORK_NAME..."
              CONTAINERS=$(docker network inspect "$NETWORK_NAME" --format '{{range .Containers}}{{.Name}} {{end}}' 2>/dev/null || echo "")
              if [ -n "$CONTAINERS" ]; then
                echo "$CONTAINERS" | tr ' ' '\n' | grep -v '^$' | while read container; do
                  if [ -n "$container" ]; then
                    echo "Disconnecting container: $container"
                    docker network disconnect -f "$NETWORK_NAME" "$container" 2>/dev/null || true
                  fi
                done
                sleep 2
              fi
              # Remove network
              docker network rm "$NETWORK_NAME" 2>/dev/null || true
              sleep 1
            fi
            # Prune unused networks to ensure it's gone
            docker network prune -f 2>/dev/null || true
            sleep 2
            
            # Build and start services
            echo "🔨 Building services..."
            docker compose build --no-cache
            
            # One more cleanup check before starting - use reliable method
            echo "🔍 Pre-start cleanup check..."
            pre_start_ids=$(docker ps -a --filter "name=gisul-" --format "{{.ID}} {{.Names}}" | grep -v "gisul-aiml-agent-service" | awk '{print $1}' | tr '\n' ' ')
            if [ -n "$pre_start_ids" ]; then
              echo "⚠️  Found remaining containers before start, removing..."
              for id in $pre_start_ids; do
                if [ -n "$id" ]; then
                  name=$(docker ps -a --filter "id=$id" --format "{{.Names}}")
                  echo "Removing remaining container: $name ($id)"
                  docker stop "$id" 2>/dev/null || true
                  docker rm -f "$id" 2>/dev/null || true
                fi
              done
              sleep 1
            fi
            
            # Network cleanup already done earlier, docker-compose will create it fresh
            echo "✅ Network cleanup completed earlier, docker-compose will create network fresh"
            
            # One final container check - check by exact names to be absolutely sure
            echo "🔍 Final container check before docker-compose up..."
            # Check each container by exact name using grep (more reliable than Docker filter)
            for container_name in gisul-frontend gisul-api-gateway gisul-auth-service \
                                 gisul-ai-assessment-service gisul-custom-mcq-service \
                                 gisul-aiml-service gisul-dsa-service gisul-proctoring-service \
                                 gisul-super-admin-service gisul-employee-service gisul-demo-service gisul-redis; do
              # Use grep for exact match instead of Docker filter (which doesn't support regex)
              container_id=$(docker ps -a --format "{{.ID}} {{.Names}}" | grep -E "^[a-f0-9]+ ${container_name}$" | awk '{print $1}' | head -1)
              if [ -n "$container_id" ]; then
                echo "⚠️  Found container before docker-compose up: $container_name ($container_id), removing..."
                docker stop "$container_id" 2>/dev/null || true
                docker rm -f "$container_id" 2>/dev/null || true
              fi
            done
            
            # Also check with filter as backup
            final_check_ids=$(docker ps -a --filter "name=gisul-" --format "{{.ID}} {{.Names}}" | grep -v "gisul-aiml-agent-service" | awk '{print $1}' | tr '\n' ' ')
            if [ -n "$final_check_ids" ]; then
              echo "⚠️  Found additional containers with filter, removing..."
              for id in $final_check_ids; do
                if [ -n "$id" ]; then
                  name=$(docker ps -a --filter "id=$id" --format "{{.Names}}")
                  echo "Removing container: $name ($id)"
                  docker stop "$id" 2>/dev/null || true
                  docker rm -f "$id" 2>/dev/null || true
                fi
              done
            fi
            
            # Verify all are gone
            sleep 2
            remaining=$(docker ps -a --filter "name=gisul-" --format "{{.Names}}" | grep -v "gisul-aiml-agent-service" | wc -l | tr -d ' ')
            # Ensure remaining is a number, default to 0 if empty
            remaining=${remaining:-0}
            if [ "$remaining" -gt 0 ] 2>/dev/null; then
              echo "❌ ERROR: Containers still exist after final cleanup!"
              docker ps -a --filter "name=gisul-"
              echo "Force removing all..."
              docker ps -a --filter "name=gisul-" --format "{{.ID}}" | grep -v "$(docker ps -a --filter "name=gisul-aiml-agent-service" --format "{{.ID}}")" | xargs -r docker rm -f 2>/dev/null || true
              sleep 2
            fi
            
            # Final check one more time - use exact name matching
            echo "🔍 Absolute final check - removing any remaining containers..."
            for container_name in gisul-frontend gisul-api-gateway gisul-auth-service \
                                 gisul-ai-assessment-service gisul-custom-mcq-service \
                                 gisul-aiml-service gisul-dsa-service gisul-proctoring-service \
                                 gisul-super-admin-service gisul-employee-service gisul-demo-service gisul-redis; do
              # Check by exact name match
              if docker ps -a --format "{{.Names}}" | grep -qE "^${container_name}$"; then
                echo "Force removing: $container_name"
                # Try by name first (faster)
                docker rm -f "$container_name" 2>/dev/null || true
                # If that fails, get ID and remove by ID
                container_id=$(docker ps -a --format "{{.ID}} {{.Names}}" | grep -E "^[a-f0-9]+ ${container_name}$" | awk '{print $1}' | head -1)
                if [ -n "$container_id" ]; then
                  echo "Removing by ID: $container_name ($container_id)"
                  docker rm -f "$container_id" 2>/dev/null || true
                fi
              fi
            done
            sleep 2
            
            # Last check - verify NO containers exist before docker-compose up
            echo "🔍 Last verification - ensuring zero containers exist..."
            all_containers=$(docker ps -a --format "{{.Names}}" | grep -E "^(gisul-frontend|gisul-api-gateway|gisul-auth-service|gisul-ai-assessment-service|gisul-custom-mcq-service|gisul-aiml-service|gisul-dsa-service|gisul-proctoring-service|gisul-super-admin-service|gisul-employee-service|gisul-demo-service|gisul-redis)$" | grep -v "gisul-aiml-agent-service" || true)
            if [ -n "$all_containers" ]; then
              echo "❌ CRITICAL: Containers still exist right before docker-compose up!"
              echo "$all_containers"
              echo "Force removing all found containers..."
              echo "$all_containers" | while read container_name; do
                if [ -n "$container_name" ]; then
                  echo "Emergency removal: $container_name"
                  docker rm -f "$container_name" 2>/dev/null || true
                fi
              done
              sleep 2
            else
              echo "✅ Verified: No containers exist, safe to proceed"
            fi
            
            echo "🚀 Starting services..."
            # Don't use --force-recreate to avoid double creation
            # The cleanup above ensures containers don't exist
            # If docker-compose fails, clean up and exit to prevent partial state
            if ! docker compose up -d --remove-orphans; then
              echo "❌ docker-compose up failed, cleaning up and exiting..."
              docker compose down --remove-orphans 2>/dev/null || true
              # Remove any containers that were created by exact name
              for container_name in gisul-frontend gisul-api-gateway gisul-auth-service \
                                   gisul-ai-assessment-service gisul-custom-mcq-service \
                                   gisul-aiml-service gisul-dsa-service gisul-proctoring-service \
                                   gisul-super-admin-service gisul-employee-service gisul-demo-service gisul-redis; do
                docker rm -f "$container_name" 2>/dev/null || true
              done
              exit 1
            fi
            
            # Wait for network to be fully ready before containers start
            echo "⏳ Waiting for network to be ready..."
            NETWORK_READY=false
            NETWORK_RETRIES=10
            NETWORK_RETRY=0
            while [ $NETWORK_RETRY -lt $NETWORK_RETRIES ]; do
              # Find the actual network name
              NETWORK_NAME=$(docker network ls --format "{{.Name}}" | grep -E "(aptor|gisul).*microservices-network" | head -1 || echo "")
              if [ -n "$NETWORK_NAME" ] && docker network inspect "$NETWORK_NAME" >/dev/null 2>&1; then
                # Check if network is ready (has bridge driver and is not in error state)
                NETWORK_STATE=$(docker network inspect "$NETWORK_NAME" --format '{{.Driver}}' 2>/dev/null || echo "")
                if [ "$NETWORK_STATE" = "bridge" ]; then
                  NETWORK_READY=true
                  echo "✅ Network $NETWORK_NAME is ready"
                  break
                fi
              fi
              NETWORK_RETRY=$((NETWORK_RETRY + 1))
              echo "Waiting for network... (attempt $NETWORK_RETRY/$NETWORK_RETRIES)"
              sleep 1
            done
            
            if [ "$NETWORK_READY" = "false" ]; then
              echo "⚠️  WARNING: Network may not be fully ready, but continuing..."
            fi
            
            # Wait for services
            echo "⏳ Waiting for services to be ready..."
            sleep 10
            
            # Status check
            echo "📊 Container status:"
            docker compose ps
            
            # Verify containers are running
            echo "✅ Verifying services..."
            docker compose ps | grep -q "Up" || (echo "❌ Some services failed to start" && exit 1)
            
            echo "✅ QA deployment completed successfully!"
          EOF
      - name: Verify Deployment
        run: |
          echo "✅ Deployment workflow completed"
          echo "📦 All services deployed to: ${{ env.VM_HOST }}"
          echo "🌿 Branch: QA"