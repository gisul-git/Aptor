name: Deploy All Services to QA (Debian VM)

on:
  push:
    branches: [QA]
  pull_request:
    types: [closed]
    branches: [QA]
  workflow_dispatch:

env:
  VM_HOST: ${{ secrets.QA_VM_HOST }}
  VM_USER: ${{ secrets.QA_VM_USER }}
  VM_SSH_KEY: ${{ secrets.QA_VM_SSH_KEY }}
  VM_DEPLOY_PATH: ${{ secrets.QA_VM_DEPLOY_PATH }}

jobs:
  deploy-to-qa-vm:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: QA

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Debian VM
        run: |
          DEPLOY_PATH="${{ env.VM_DEPLOY_PATH }}"
          if [ -z "$DEPLOY_PATH" ]; then
            DEPLOY_PATH="/opt/aptor"
          fi

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.VM_USER }}@${{ env.VM_HOST }} << 'EOF'
            set -e

            echo "🚀 Starting QA deployment..."

            cd /opt/aptor

            echo "📥 Updating repository..."
            git fetch origin
            git reset --hard origin/QA

            echo "🔐 Checking .env file..."
            if [ ! -f .env ]; then
              echo "❌ .env file missing!"
              exit 1
            fi

            echo "🛑 Stopping existing services..."
            docker compose down --remove-orphans

            echo "🧹 Cleaning unused images..."
            docker system prune -f

            echo "🔨 Building services..."
            docker compose build --no-cache

            echo "🚀 Starting services..."
            docker compose up -d

            echo "⏳ Waiting for services..."
            sleep 10

            echo "📊 Container status:"
            docker compose ps

            echo "✅ QA deployment completed successfully!"
          EOF

      - name: Verify Deployment
        run: |
          echo "✅ Deployment workflow completed"
          echo "📦 All services deployed to: ${{ env.VM_HOST }}"
          echo "🌿 Branch: QA"