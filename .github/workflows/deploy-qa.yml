name: Deploy All Services to QA (Debian VM)

on:
  push:
    branches:
      - QA
  pull_request:
    types: [closed]
    branches:
      - QA
  workflow_dispatch:

env:
  VM_HOST: ${{ secrets.QA_VM_HOST }}
  VM_USER: ${{ secrets.QA_VM_USER }}
  VM_SSH_KEY: ${{ secrets.QA_VM_SSH_KEY }}
  VM_DEPLOY_PATH: ${{ secrets.QA_VM_DEPLOY_PATH }}

jobs:
  deploy-to-qa-vm:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: QA

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Debian VM
        run: |
          DEPLOY_PATH="${{ env.VM_DEPLOY_PATH }}"
          if [ -z "$DEPLOY_PATH" ]; then
            DEPLOY_PATH="/opt/aptor"
          fi
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.VM_USER }}@${{ env.VM_HOST }} bash << EOF
            set -e
            
            echo "🚀 Starting QA deployment..."
            
            # Navigate to deployment directory
            cd ${DEPLOY_PATH}
            
            # Backup critical files
            echo "💾 Backing up .env file..."
            if [ -f .env ]; then
              cp .env .env.backup
              echo "✅ .env backed up"
            fi
            
            # Update code from repository
            echo "🔄 Updating code from QA branch..."
            
            # Clean up Git lock files and corrupted refs
            echo "🧹 Cleaning up Git references..."
            find .git/refs -type f -name "*.lock" -delete 2>/dev/null || true
            rm -rf .git/refs/remotes/origin/* 2>/dev/null || true
            
            git fetch origin --prune
            git stash push -m "Auto-stash before deployment $(date +%Y%m%d_%H%M%S)" 2>/dev/null || true
            git checkout QA
            git reset --hard origin/QA
            echo "✅ Code updated to latest QA branch"
            
            # Verify .env file exists
            if [ ! -f .env ]; then
              echo "❌ ERROR: .env file not found!"
              exit 1
            fi
            echo "✅ .env file verified"
            
            # Stop all containers
            echo "🛑 Stopping all containers..."
            docker compose down --timeout 30 --remove-orphans 2>/dev/null || true
            
            # Force remove any remaining containers
            echo "🧹 Removing any remaining containers..."
            docker ps -aq --filter "name=gisul-" | xargs -r docker rm -f 2>/dev/null || true
            
            # Remove old images to prevent conflicts
            echo "🧹 Removing old images..."
            docker images --format "{{.Repository}}:{{.Tag}}" | grep "ghcr.io/local/gisul-" | xargs -r docker rmi -f 2>/dev/null || true
            
            # Clean up Docker system (preserve volumes)
            echo "🧹 Cleaning Docker system..."
            docker system prune -af 2>/dev/null || true
            
            # Remove network if exists
            echo "🧹 Removing old network..."
            docker network rm aptor_microservices-network 2>/dev/null || true
            
            # Build services with clean slate
            echo "🔨 Building services..."
            docker compose build --no-cache --pull
            
            # Start services
            echo "🚀 Starting services..."
            docker compose up -d
            
            # Wait for services to initialize
            echo "⏳ Waiting for services to initialize..."
            sleep 30
            
            # Check service status
            echo "📊 Service status:"
            docker compose ps
            
            # Verify services are running
            echo "✅ Verifying services..."
            RUNNING_COUNT=$(docker compose ps --filter "status=running" --format json | wc -l)
            if [ "$RUNNING_COUNT" -lt 5 ]; then
              echo "⚠️  Warning: Only $RUNNING_COUNT services are running"
              docker compose logs --tail=50
            else
              echo "✅ $RUNNING_COUNT services are running"
            fi
            
            echo "✅ QA deployment completed successfully!"
          EOF

      - name: Verify Deployment
        run: |
          echo "✅ Deployment workflow completed"
          echo "📦 All services deployed to: ${{ env.VM_HOST }}"
          echo "🌿 Branch: QA"
