name: Deploy All Services to QA (Debian VM)

on:
  push:
    branches:
      - QA
  pull_request:
    types: [closed]
    branches:
      - QA
  workflow_dispatch: # Allow manual triggering

env:
  VM_HOST: ${{ secrets.QA_VM_HOST }}
  VM_USER: ${{ secrets.QA_VM_USER }}
  VM_SSH_KEY: ${{ secrets.QA_VM_SSH_KEY }}
  VM_DEPLOY_PATH: ${{ secrets.QA_VM_DEPLOY_PATH }}

jobs:
  deploy-to-qa-vm:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: QA

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Debian VM
        run: |
          DEPLOY_PATH="${{ env.VM_DEPLOY_PATH }}"
          if [ -z "$DEPLOY_PATH" ]; then
            DEPLOY_PATH="/opt/aptor"
          fi
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.VM_USER }}@${{ env.VM_HOST }} bash << EOF
            set -e
            
            echo "🚀 Starting QA deployment..."
            
            # Navigate to deployment directory
            cd ${DEPLOY_PATH}
            
            # Pull latest code from QA branch
            echo "📥 Pulling latest code from QA branch..."
            git fetch origin
            git checkout QA
            git pull origin QA
            
            # Ensure .env file exists
            if [ ! -f .env ]; then
              echo "⚠️  Warning: .env file not found. Please ensure environment variables are set."
            fi
            
            # Preserve aiml-agent-service - ensure it stays running
            echo "🔒 Preserving aiml-agent-service..."
            AIML_AGENT_RUNNING=false
            if docker compose ps aiml-agent-service 2>/dev/null | grep -q "Up"; then
              AIML_AGENT_RUNNING=true
              echo "✅ aiml-agent-service is running, will preserve it"
            fi
            
            # Stop existing containers (excluding aiml-agent-service)
            echo "🛑 Stopping existing containers (excluding aiml-agent-service)..."
            for service in $(docker compose ps --services 2>/dev/null); do
              if [ "$service" != "aiml-agent-service" ]; then
                echo "  Stopping $service..."
                docker compose stop "$service" || true
              fi
            done
            
            # Remove stopped containers (excluding aiml-agent-service)
            echo "🧹 Removing stopped containers (excluding aiml-agent-service)..."
            for service in $(docker compose ps -a --services 2>/dev/null); do
              if [ "$service" != "aiml-agent-service" ]; then
                echo "  Removing $service..."
                docker compose rm -f "$service" || true
              fi
            done
            
            # Remove any orphaned containers with our naming pattern (excluding aiml-agent-service)
            docker ps -a --filter "name=gisul-" --format "{{.Names}} {{.ID}}" | grep -v "aiml-agent-service" | awk '{print $2}' | xargs -r docker rm -f || true
            
            # Cleanup old images
            echo "🧹 Cleaning up old Docker images..."
            docker system prune -f || true
            
            # Build and start services
            echo "🔨 Building services..."
            docker compose build --no-cache
            
            echo "🚀 Starting services..."
            docker compose up -d
            
            # Ensure aiml-agent-service is running if it was running before
            if [ "$AIML_AGENT_RUNNING" = "true" ]; then
              echo "🔄 Ensuring aiml-agent-service is still running..."
              docker compose up -d aiml-agent-service || true
            fi
            
            # Wait for services
            echo "⏳ Waiting for services to be ready..."
            sleep 10
            
            # Status check
            echo "📊 Container status:"
            docker compose ps
            
            # Verify containers are running
            echo "✅ Verifying services..."
            docker compose ps | grep -q "Up" || (echo "❌ Some services failed to start" && exit 1)
            
            echo "✅ QA deployment completed successfully!"
          EOF

      - name: Verify Deployment
        run: |
          echo "✅ Deployment workflow completed"
          echo "📦 All services deployed to: ${{ env.VM_HOST }}"
          echo "🌿 Branch: QA"
