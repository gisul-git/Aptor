name: Deploy to QA (Optimized)

# ROLLBACK INSTRUCTIONS:
# If deployment fails or you need to rollback:
# 1. Go to Actions tab > Deploy to QA (Optimized)
# 2. Find a previous successful run
# 3. Click "Re-run all jobs"
# OR manually on VM: ./scripts/deploy-qa.sh qa-<previous-commit-sha>

on:
  push:
    branches:
      - QA
  pull_request:
    types: [closed]
    branches:
      - QA
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: qa-${{ github.sha }}

jobs:
  # Build all images in parallel with caching
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: frontend
            context: ./frontend
          - name: api-gateway
            context: ./services/api-gateway
          - name: auth-service
            context: ./services/auth-service
          - name: ai-assessment-service
            context: ./services/ai-assessment-service
          - name: custom-mcq-service
            context: ./services/custom-mcq-service
          - name: aiml-service
            context: ./services/aiml-service
          - name: aiml-agent-service
            context: ./services/aiml-agent-service
          - name: dsa-service
            context: ./services/dsa-service
          - name: proctoring-service
            context: ./services/proctoring-service
          - name: super-admin-service
            context: ./services/super-admin-service
          - name: employee-service
            context: ./services/employee-service
          - name: demo-service
            context: ./services/demo-service
      fail-fast: false
      max-parallel: 6

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: QA

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/gisul-${{ matrix.service.name }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=qa-latest

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.context }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/gisul-${{ matrix.service.name }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/gisul-${{ matrix.service.name }}:buildcache,mode=max
          build-args: |
            NEXT_PUBLIC_AIML_AGENT_URL=${{ secrets.NEXT_PUBLIC_AIML_AGENT_URL }}

  # Deploy to QA VM
  deploy-to-qa:
    runs-on: ubuntu-latest
    needs: build-images
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: QA

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.QA_VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.QA_VM_HOST }} >> ~/.ssh/known_hosts

      - name: Copy deployment files to VM
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            docker-compose.yml \
            ${{ secrets.QA_VM_USER }}@${{ secrets.QA_VM_HOST }}:${{ secrets.QA_VM_DEPLOY_PATH }}/

      - name: Deploy to QA VM
        env:
          DEPLOY_PATH: ${{ secrets.QA_VM_DEPLOY_PATH }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          REGISTRY: ${{ env.REGISTRY }}
          REPO: ${{ github.repository }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.QA_VM_USER }}@${{ secrets.QA_VM_HOST }} \
            "bash -s" << 'ENDSSH'
          set -e
          
          echo "🚀 Starting QA deployment..."
          cd ${DEPLOY_PATH:-/opt/aptor}
          
          # Verify .env exists
          if [ ! -f .env ]; then
            echo "❌ ERROR: .env file not found!"
            exit 1
          fi
          
          # Export environment variables for docker-compose
          export DOCKER_REGISTRY="${REGISTRY}"
          export GITHUB_REPOSITORY="${REPO}"
          export IMAGE_TAG="${IMAGE_TAG}"
          
          # Login to GitHub Container Registry
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Pull all new images in parallel
          echo "📥 Pulling new images..."
          docker compose pull --quiet
          
          # Rolling update - update services one by one with health checks
          echo "🔄 Performing rolling update..."
          
          # Update infrastructure services first (redis is already running)
          
          # Update backend services with dependencies
          SERVICES="auth-service api-gateway ai-assessment-service custom-mcq-service aiml-agent-service aiml-service dsa-service proctoring-service super-admin-service employee-service demo-service"
          
          for service in $SERVICES; do
            echo "🔄 Updating $service..."
            docker compose up -d --no-deps --wait --timeout 60 $service
            
            if [ $? -eq 0 ]; then
              echo "✅ $service updated successfully"
            else
              echo "❌ $service update failed, rolling back..."
              docker compose logs --tail=50 $service
              exit 1
            fi
          done
          
          # Update frontend last (depends on api-gateway)
          echo "🔄 Updating frontend..."
          docker compose up -d --no-deps --wait --timeout 60 frontend
          
          if [ $? -eq 0 ]; then
            echo "✅ frontend updated successfully"
          else
            echo "❌ frontend update failed, rolling back..."
            docker compose logs --tail=50 frontend
            exit 1
          fi
          
          # Clean up old images
          echo "🧹 Cleaning up old images..."
          docker image prune -af --filter "until=24h" || true
          
          # Final status check
          echo "📊 Deployment Status:"
          docker compose ps
          
          # Verify all services are healthy
          echo "🏥 Health Check:"
          UNHEALTHY=$(docker compose ps --format json | jq -r 'select(.Health != "healthy" and .Health != "") | .Service' 2>/dev/null || echo "")
          
          if [ -n "$UNHEALTHY" ]; then
            echo "⚠️  Warning: Some services are not healthy: $UNHEALTHY"
            docker compose ps
          else
            echo "✅ All services are healthy"
          fi
          
          echo "✅ QA deployment completed successfully!"
          ENDSSH

      - name: Verify Deployment
        run: |
          echo "✅ Deployment completed"
          echo "📦 Deployed to: ${{ secrets.QA_VM_HOST }}"
          echo "🏷️  Image Tag: ${{ env.IMAGE_TAG }}"
          echo "🌿 Branch: QA"

      - name: Deployment Summary
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed. Check logs above."
          fi
