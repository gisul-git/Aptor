name: Deploy All Services to QA (Debian VM)

on:
  push:
    branches:
      - QA
  pull_request:
    types: [closed]
    branches:
      - QA
  workflow_dispatch: # Allow manual triggerings

env:
  VM_HOST: ${{ secrets.QA_VM_HOST }}
  VM_USER: ${{ secrets.QA_VM_USER }}
  VM_SSH_KEY: ${{ secrets.QA_VM_SSH_KEY }}
  VM_DEPLOY_PATH: ${{ secrets.QA_VM_DEPLOY_PATH }}

jobs:
  deploy-to-qa-vm:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: QA
          fetch-depth: 0  # Fetch all history for proper diff

      - name: Detect changed services
        id: changes
        run: |
          echo "🔍 Detecting changed services..."
          echo "Event: ${{ github.event_name }}"
          echo "Current SHA: ${{ github.sha }}"
          echo "Before SHA: ${{ github.event.before }}"
          
          # Get the previous commit (for push events) or base commit (for PRs)
          if [ "${{ github.event_name }}" == "push" ]; then
            PREV_COMMIT="${{ github.event.before }}"
            CURR_COMMIT="${{ github.sha }}"
            
            # If before is empty or null, use HEAD~1 as fallback
            if [ -z "$PREV_COMMIT" ] || [ "$PREV_COMMIT" == "null" ] || [ "$PREV_COMMIT" == "0000000000000000000000000000000000000000" ]; then
              echo "⚠️  github.event.before is empty, using HEAD~1"
              PREV_COMMIT=$(git rev-parse HEAD~1 2>/dev/null || echo "")
              CURR_COMMIT=$(git rev-parse HEAD)
            fi
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            PREV_COMMIT="${{ github.event.pull_request.base.sha }}"
            CURR_COMMIT="${{ github.event.pull_request.head.sha }}"
          else
            # For workflow_dispatch, compare with previous commit on QA branch
            echo "🔄 Workflow dispatch - comparing with previous commit on QA"
            git fetch origin QA --depth=10
            PREV_COMMIT=$(git rev-parse origin/QA~1 2>/dev/null || git rev-parse HEAD~1 2>/dev/null || echo "")
            CURR_COMMIT=$(git rev-parse HEAD)
          fi
          
          # Debug: Show commits being compared
          echo "🔍 Comparing commits: $PREV_COMMIT -> $CURR_COMMIT"
          
          # If no previous commit, deploy everything
          if [ -z "$PREV_COMMIT" ] || [ "$PREV_COMMIT" == "0000000000000000000000000000000000000000" ] || [ "$PREV_COMMIT" == "null" ]; then
            echo "⚠️  No previous commit found, deploying all services"
            echo "changed_services=all" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Verify commits exist, fetch if needed
          if ! git cat-file -e "$PREV_COMMIT" 2>/dev/null; then
            echo "⚠️  Previous commit not found in local repo, fetching..."
            git fetch origin --depth=100
            # Try again with HEAD~1 if still not found
            if ! git cat-file -e "$PREV_COMMIT" 2>/dev/null; then
              echo "⚠️  Still not found, using HEAD~1"
              PREV_COMMIT=$(git rev-parse HEAD~1 2>/dev/null || echo "")
            fi
          fi
          
          if ! git cat-file -e "$CURR_COMMIT" 2>/dev/null; then
            echo "⚠️  Current commit not found in local repo, using HEAD"
            CURR_COMMIT=$(git rev-parse HEAD)
          fi
          
          # Final check - if still no valid previous commit, deploy all
          if [ -z "$PREV_COMMIT" ] || [ "$PREV_COMMIT" == "0000000000000000000000000000000000000000" ]; then
            echo "⚠️  Could not determine previous commit, deploying all services"
            echo "changed_services=all" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "✅ Using commits: $PREV_COMMIT -> $CURR_COMMIT"
          
          # Check if docker-compose.yml changed (affects all services)
          if git diff --name-only $PREV_COMMIT $CURR_COMMIT | grep -q "^docker-compose.yml$"; then
            echo "📦 docker-compose.yml changed, deploying all services"
            echo "changed_services=all" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check which services changed
          CHANGED_SERVICES=""
          
          # Frontend - check for any changes in frontend directory
          if git diff --name-only $PREV_COMMIT $CURR_COMMIT | grep -qE "^frontend/|^frontend$"; then
            CHANGED_SERVICES="${CHANGED_SERVICES}frontend "
            echo "✅ Frontend changed"
            git diff --name-only $PREV_COMMIT $CURR_COMMIT | grep -E "^frontend/" | head -5
          fi
          
          # API Gateway
          if git diff --name-only $PREV_COMMIT $CURR_COMMIT | grep -q "^services/api-gateway/"; then
            CHANGED_SERVICES="${CHANGED_SERVICES}api-gateway "
            echo "✅ API Gateway changed"
          fi
          
          # Auth Service
          if git diff --name-only $PREV_COMMIT $CURR_COMMIT | grep -q "^services/auth-service/"; then
            CHANGED_SERVICES="${CHANGED_SERVICES}auth-service "
            echo "✅ Auth Service changed"
          fi
          
          # AI Assessment Service
          if git diff --name-only $PREV_COMMIT $CURR_COMMIT | grep -q "^services/ai-assessment-service/"; then
            CHANGED_SERVICES="${CHANGED_SERVICES}ai-assessment-service "
            echo "✅ AI Assessment Service changed"
          fi
          
          # Custom MCQ Service
          if git diff --name-only $PREV_COMMIT $CURR_COMMIT | grep -q "^services/custom-mcq-service/"; then
            CHANGED_SERVICES="${CHANGED_SERVICES}custom-mcq-service "
            echo "✅ Custom MCQ Service changed"
          fi
          
          # AIML Service
          if git diff --name-only $PREV_COMMIT $CURR_COMMIT | grep -q "^services/aiml-service/"; then
            CHANGED_SERVICES="${CHANGED_SERVICES}aiml-service "
            echo "✅ AIML Service changed"
          fi
          
          # AIML Agent Service
          if git diff --name-only $PREV_COMMIT $CURR_COMMIT | grep -q "^services/aiml-agent-service/"; then
            CHANGED_SERVICES="${CHANGED_SERVICES}aiml-agent-service "
            echo "✅ AIML Agent Service changed"
          fi
          
          # DSA Service
          if git diff --name-only $PREV_COMMIT $CURR_COMMIT | grep -q "^services/dsa-service/"; then
            CHANGED_SERVICES="${CHANGED_SERVICES}dsa-service "
            echo "✅ DSA Service changed"
          fi
          
          # Proctoring Service
          if git diff --name-only $PREV_COMMIT $CURR_COMMIT | grep -q "^services/proctoring-service/"; then
            CHANGED_SERVICES="${CHANGED_SERVICES}proctoring-service "
            echo "✅ Proctoring Service changed"
          fi
          
          # Super Admin Service
          if git diff --name-only $PREV_COMMIT $CURR_COMMIT | grep -q "^services/super-admin-service/"; then
            CHANGED_SERVICES="${CHANGED_SERVICES}super-admin-service "
            echo "✅ Super Admin Service changed"
          fi
          
          # Employee Service
          if git diff --name-only $PREV_COMMIT $CURR_COMMIT | grep -q "^services/employee-service/"; then
            CHANGED_SERVICES="${CHANGED_SERVICES}employee-service "
            echo "✅ Employee Service changed"
          fi
          
          # Trim trailing space from CHANGED_SERVICES
          CHANGED_SERVICES=$(echo "$CHANGED_SERVICES" | xargs)
          
          # Debug: Show all changed files first
          echo "📝 All changed files between $PREV_COMMIT and $CURR_COMMIT:"
          CHANGED_FILES=$(git diff --name-only $PREV_COMMIT $CURR_COMMIT 2>/dev/null || echo "")
          if [ -n "$CHANGED_FILES" ]; then
            echo "$CHANGED_FILES" | head -30
            echo "---"
          else
            echo "⚠️  No changed files detected! This might indicate a problem with commit comparison."
            echo "Trying alternative: comparing HEAD with HEAD~1"
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
            if [ -n "$CHANGED_FILES" ]; then
              echo "Alternative comparison (HEAD~1 vs HEAD) found:"
              echo "$CHANGED_FILES" | head -30
              # Re-run detection with HEAD~1 vs HEAD
              PREV_COMMIT=$(git rev-parse HEAD~1)
              CURR_COMMIT=$(git rev-parse HEAD)
              CHANGED_SERVICES=""
              # Re-check all services
              if echo "$CHANGED_FILES" | grep -qE "^frontend/"; then
                CHANGED_SERVICES="${CHANGED_SERVICES}frontend "
                echo "✅ Frontend changed (alternative detection)"
              fi
              if echo "$CHANGED_FILES" | grep -q "^services/api-gateway/"; then
                CHANGED_SERVICES="${CHANGED_SERVICES}api-gateway "
                echo "✅ API Gateway changed (alternative detection)"
              fi
              if echo "$CHANGED_FILES" | grep -q "^services/auth-service/"; then
                CHANGED_SERVICES="${CHANGED_SERVICES}auth-service "
                echo "✅ Auth Service changed (alternative detection)"
              fi
              if echo "$CHANGED_FILES" | grep -q "^services/ai-assessment-service/"; then
                CHANGED_SERVICES="${CHANGED_SERVICES}ai-assessment-service "
                echo "✅ AI Assessment Service changed (alternative detection)"
              fi
              if echo "$CHANGED_FILES" | grep -q "^services/custom-mcq-service/"; then
                CHANGED_SERVICES="${CHANGED_SERVICES}custom-mcq-service "
                echo "✅ Custom MCQ Service changed (alternative detection)"
              fi
              if echo "$CHANGED_FILES" | grep -q "^services/aiml-service/"; then
                CHANGED_SERVICES="${CHANGED_SERVICES}aiml-service "
                echo "✅ AIML Service changed (alternative detection)"
              fi
              if echo "$CHANGED_FILES" | grep -q "^services/aiml-agent-service/"; then
                CHANGED_SERVICES="${CHANGED_SERVICES}aiml-agent-service "
                echo "✅ AIML Agent Service changed (alternative detection)"
              fi
              if echo "$CHANGED_FILES" | grep -q "^services/dsa-service/"; then
                CHANGED_SERVICES="${CHANGED_SERVICES}dsa-service "
                echo "✅ DSA Service changed (alternative detection)"
              fi
              if echo "$CHANGED_FILES" | grep -q "^services/proctoring-service/"; then
                CHANGED_SERVICES="${CHANGED_SERVICES}proctoring-service "
                echo "✅ Proctoring Service changed (alternative detection)"
              fi
              if echo "$CHANGED_FILES" | grep -q "^services/super-admin-service/"; then
                CHANGED_SERVICES="${CHANGED_SERVICES}super-admin-service "
                echo "✅ Super Admin Service changed (alternative detection)"
              fi
              if echo "$CHANGED_FILES" | grep -q "^services/employee-service/"; then
                CHANGED_SERVICES="${CHANGED_SERVICES}employee-service "
                echo "✅ Employee Service changed (alternative detection)"
              fi
              CHANGED_SERVICES=$(echo "$CHANGED_SERVICES" | xargs)
            fi
          fi
          
          # If no services changed, deploy all (safety measure)
          if [ -z "$CHANGED_SERVICES" ]; then
            echo "ℹ️  No service-specific changes detected, deploying all services"
            echo "changed_services=all" >> $GITHUB_OUTPUT
          else
            echo "📋 Changed services: $CHANGED_SERVICES"
            echo "changed_services=$CHANGED_SERVICES" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Debian VM
        run: |
          DEPLOY_PATH="${{ env.VM_DEPLOY_PATH }}"
          if [ -z "$DEPLOY_PATH" ]; then
            DEPLOY_PATH="/opt/aptor"
          fi
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.VM_USER }}@${{ env.VM_HOST }} bash << EOF
            set -e
            
            CHANGED_SERVICES="${{ steps.changes.outputs.changed_services }}"
            
            echo "🚀 Starting QA deployment..."
            echo "📋 Services to deploy (from GitHub Actions): $CHANGED_SERVICES"
            
            # Navigate to deployment directory
            cd ${DEPLOY_PATH}
            
            # Sync workspace with QA branch
            echo "📥 Syncing workspace with QA branch..."
            
            # Backup critical files
            echo "💾 Backing up critical files..."
            if [ -f .env ]; then
              cp .env .env.backup
              echo "✅ .env backed up"
            fi
            
            # Fetch and checkout latest changes - handle local changes
            echo "🔄 Updating code from repository..."
            git fetch origin
            
            # Store current HEAD before reset (for change detection fallback)
            OLD_HEAD=$(git rev-parse HEAD 2>/dev/null || echo "")
            
            # Stash or discard local changes to allow pull
            if [ -n "$(git status --porcelain)" ]; then
              echo "⚠️  Local changes detected, stashing them..."
              git stash push -m "Auto-stash before deployment $(date +%Y%m%d_%H%M%S)" || true
            fi
            
            # Reset to remote QA branch to ensure clean state
            git checkout QA
            git reset --hard origin/QA || {
              echo "⚠️  Reset failed, trying pull..."
              git pull origin QA --no-edit || {
                echo "⚠️  Pull failed, forcing reset..."
                git fetch origin
                git reset --hard origin/QA
              }
            }
            
            NEW_HEAD=$(git rev-parse HEAD)
            echo "✅ Code updated to latest QA branch"
            echo "📌 HEAD moved from $OLD_HEAD to $NEW_HEAD"
            
            # Ensure .env file exists
            if [ ! -f .env ]; then
              echo "❌ ERROR: .env file not found after git operations!"
              echo "⚠️  Deployment cannot proceed without .env file."
              exit 1
            else
              echo "✅ .env file verified"
            fi
            
            # Validate CHANGED_SERVICES - if empty, try to detect changes on VM
            if [ -z "$CHANGED_SERVICES" ] || [ "$CHANGED_SERVICES" == "" ]; then
              echo "⚠️  CHANGED_SERVICES is empty from GitHub Actions"
              echo "🔄 Attempting to detect changes locally on VM..."
              
              # Try to detect changes by comparing current HEAD with previous commit
              if [ -n "$OLD_HEAD" ] && [ "$OLD_HEAD" != "$NEW_HEAD" ]; then
                echo "🔍 Comparing $OLD_HEAD with $NEW_HEAD"
                VM_CHANGED_SERVICES=""
                
                if git diff --name-only $OLD_HEAD $NEW_HEAD 2>/dev/null | grep -qE "^frontend/"; then
                  VM_CHANGED_SERVICES="${VM_CHANGED_SERVICES}frontend "
                  echo "✅ Frontend changed (detected on VM)"
                fi
                if git diff --name-only $OLD_HEAD $NEW_HEAD 2>/dev/null | grep -q "^services/api-gateway/"; then
                  VM_CHANGED_SERVICES="${VM_CHANGED_SERVICES}api-gateway "
                  echo "✅ API Gateway changed (detected on VM)"
                fi
                if git diff --name-only $OLD_HEAD $NEW_HEAD 2>/dev/null | grep -q "^services/auth-service/"; then
                  VM_CHANGED_SERVICES="${VM_CHANGED_SERVICES}auth-service "
                  echo "✅ Auth Service changed (detected on VM)"
                fi
                if git diff --name-only $OLD_HEAD $NEW_HEAD 2>/dev/null | grep -q "^services/ai-assessment-service/"; then
                  VM_CHANGED_SERVICES="${VM_CHANGED_SERVICES}ai-assessment-service "
                  echo "✅ AI Assessment Service changed (detected on VM)"
                fi
                if git diff --name-only $OLD_HEAD $NEW_HEAD 2>/dev/null | grep -q "^services/custom-mcq-service/"; then
                  VM_CHANGED_SERVICES="${VM_CHANGED_SERVICES}custom-mcq-service "
                  echo "✅ Custom MCQ Service changed (detected on VM)"
                fi
                if git diff --name-only $OLD_HEAD $NEW_HEAD 2>/dev/null | grep -q "^services/aiml-service/"; then
                  VM_CHANGED_SERVICES="${VM_CHANGED_SERVICES}aiml-service "
                  echo "✅ AIML Service changed (detected on VM)"
                fi
                if git diff --name-only $OLD_HEAD $NEW_HEAD 2>/dev/null | grep -q "^services/aiml-agent-service/"; then
                  VM_CHANGED_SERVICES="${VM_CHANGED_SERVICES}aiml-agent-service "
                  echo "✅ AIML Agent Service changed (detected on VM)"
                fi
                if git diff --name-only $OLD_HEAD $NEW_HEAD 2>/dev/null | grep -q "^services/dsa-service/"; then
                  VM_CHANGED_SERVICES="${VM_CHANGED_SERVICES}dsa-service "
                  echo "✅ DSA Service changed (detected on VM)"
                fi
                if git diff --name-only $OLD_HEAD $NEW_HEAD 2>/dev/null | grep -q "^services/proctoring-service/"; then
                  VM_CHANGED_SERVICES="${VM_CHANGED_SERVICES}proctoring-service "
                  echo "✅ Proctoring Service changed (detected on VM)"
                fi
                if git diff --name-only $OLD_HEAD $NEW_HEAD 2>/dev/null | grep -q "^services/super-admin-service/"; then
                  VM_CHANGED_SERVICES="${VM_CHANGED_SERVICES}super-admin-service "
                  echo "✅ Super Admin Service changed (detected on VM)"
                fi
                if git diff --name-only $OLD_HEAD $NEW_HEAD 2>/dev/null | grep -q "^services/employee-service/"; then
                  VM_CHANGED_SERVICES="${VM_CHANGED_SERVICES}employee-service "
                  echo "✅ Employee Service changed (detected on VM)"
                fi
                
                VM_CHANGED_SERVICES=$(echo "$VM_CHANGED_SERVICES" | xargs)
                
                if [ -n "$VM_CHANGED_SERVICES" ]; then
                  echo "✅ Detected changes on VM: $VM_CHANGED_SERVICES"
                  CHANGED_SERVICES="$VM_CHANGED_SERVICES"
                else
                  echo "⚠️  No changes detected on VM either, falling back to full deployment"
                  CHANGED_SERVICES="all"
                fi
              else
                echo "⚠️  Cannot compare commits (OLD_HEAD=$OLD_HEAD, NEW_HEAD=$NEW_HEAD)"
                echo "🔄 Falling back to full deployment"
                CHANGED_SERVICES="all"
              fi
            fi
            
            echo "📋 Final services to deploy: $CHANGED_SERVICES"
            
            # Helper function to map service name to container name
            # Using a variable-based approach to avoid function scope issues
            get_container_name() {
              local service="$1"
              case "$service" in
                frontend) echo "gisul-frontend" ;;
                api-gateway) echo "gisul-api-gateway" ;;
                auth-service) echo "gisul-auth-service" ;;
                ai-assessment-service) echo "gisul-ai-assessment-service" ;;
                custom-mcq-service) echo "gisul-custom-mcq-service" ;;
                aiml-service) echo "gisul-aiml-service" ;;
                aiml-agent-service) echo "gisul-aiml-agent-service" ;;
                dsa-service) echo "gisul-dsa-service" ;;
                proctoring-service) echo "gisul-proctoring-service" ;;
                super-admin-service) echo "gisul-super-admin-service" ;;
                employee-service) echo "gisul-employee-service" ;;
                *) echo "" ;;
              esac
            }
            
            # Check if we need to deploy all services
            if [ "$CHANGED_SERVICES" == "all" ]; then
              echo "🔄 Deploying ALL services (full deployment)"
              
              # Preserve aiml-agent-service if running
              echo "🔒 Preserving aiml-agent-service..."
              AIML_AGENT_RUNNING=false
              if docker compose ps aiml-agent-service 2>/dev/null | grep -q "Up"; then
                AIML_AGENT_RUNNING=true
                echo "✅ aiml-agent-service is running, will preserve it"
              fi
              
              # Stop and remove existing containers (except aiml-agent-service if running)
              echo "🛑 Stopping existing containers..."
              docker compose stop $(docker compose ps -q | grep -v "$(docker ps -a --filter 'name=gisul-aiml-agent-service' --format '{{.ID}}')" || true) 2>/dev/null || true
              
              sleep 2
              
              # Remove containers (except aiml-agent-service)
              for container in gisul-frontend gisul-api-gateway gisul-auth-service \
                              gisul-ai-assessment-service gisul-custom-mcq-service \
                              gisul-aiml-service gisul-dsa-service gisul-proctoring-service \
                              gisul-super-admin-service gisul-employee-service gisul-redis; do
                if docker ps -a --format "{{.Names}}" | grep -q "^${container}$"; then
                  echo "Removing container: ${container}"
                  docker stop "${container}" 2>/dev/null || true
                  docker rm -f "${container}" 2>/dev/null || true
                fi
              done
              
              # Build and start all services
              echo "🔨 Building all services..."
              docker compose build --no-cache
              
              echo "🚀 Starting all services..."
              docker compose up -d --remove-orphans
              
            else
              echo "🎯 Selective deployment: Only deploying changed services"
              
              # Trim and validate services list
              CHANGED_SERVICES=$(echo "$CHANGED_SERVICES" | xargs)
              
              if [ -z "$CHANGED_SERVICES" ]; then
                echo "❌ ERROR: No services to deploy after trimming!"
                exit 1
              fi
              
              echo "📦 Services to deploy: $CHANGED_SERVICES"
              
              # Deploy each changed service individually
              for service in $CHANGED_SERVICES; do
                # Get container name using inline case statement (avoid function scope issues)
                container_name=""
                case "$service" in
                  frontend) container_name="gisul-frontend" ;;
                  api-gateway) container_name="gisul-api-gateway" ;;
                  auth-service) container_name="gisul-auth-service" ;;
                  ai-assessment-service) container_name="gisul-ai-assessment-service" ;;
                  custom-mcq-service) container_name="gisul-custom-mcq-service" ;;
                  aiml-service) container_name="gisul-aiml-service" ;;
                  aiml-agent-service) container_name="gisul-aiml-agent-service" ;;
                  dsa-service) container_name="gisul-dsa-service" ;;
                  proctoring-service) container_name="gisul-proctoring-service" ;;
                  super-admin-service) container_name="gisul-super-admin-service" ;;
                  employee-service) container_name="gisul-employee-service" ;;
                esac
                
                if [ -z "$container_name" ]; then
                  echo "⚠️  Unknown service: $service, skipping..."
                  continue
                fi
                
                echo ""
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo "🔄 Deploying: $service (container: $container_name)"
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                
                # Stop and remove only this specific container
                if docker ps -a --format "{{.Names}}" | grep -q "^${container_name}$"; then
                  echo "🛑 Stopping container: $container_name"
                  docker stop "$container_name" 2>/dev/null || true
                  docker rm -f "$container_name" 2>/dev/null || true
                  sleep 1
                fi
                
                # Build only this service
                echo "🔨 Building service: $service"
                docker compose build --no-cache "$service"
                
                # Start only this service (dependencies will be started if needed)
                echo "🚀 Starting service: $service"
                docker compose up -d "$service"
                
                # Wait a bit for service to start
                sleep 2
                
                # Verify service is running
                if docker ps --format "{{.Names}}" | grep -q "^${container_name}$"; then
                  echo "✅ $service deployed successfully"
                else
                  echo "❌ $service failed to start"
                  docker compose logs --tail=50 "$service" || true
                fi
              done
              
              echo ""
              echo "✅ Selective deployment completed"
            fi
            
            # Wait for services to stabilize
            echo "⏳ Waiting for services to be ready..."
            sleep 5
            
            # Status check
            echo "📊 Container status:"
            docker compose ps
            
            # Verify containers are running
            echo "✅ Verifying services..."
            if [ "$CHANGED_SERVICES" == "all" ]; then
              docker compose ps | grep -q "Up" || (echo "❌ Some services failed to start" && exit 1)
            else
              # Verify only changed services
              for service in $CHANGED_SERVICES; do
                # Get container name using inline case statement
                container_name=""
                case "$service" in
                  frontend) container_name="gisul-frontend" ;;
                  api-gateway) container_name="gisul-api-gateway" ;;
                  auth-service) container_name="gisul-auth-service" ;;
                  ai-assessment-service) container_name="gisul-ai-assessment-service" ;;
                  custom-mcq-service) container_name="gisul-custom-mcq-service" ;;
                  aiml-service) container_name="gisul-aiml-service" ;;
                  aiml-agent-service) container_name="gisul-aiml-agent-service" ;;
                  dsa-service) container_name="gisul-dsa-service" ;;
                  proctoring-service) container_name="gisul-proctoring-service" ;;
                  super-admin-service) container_name="gisul-super-admin-service" ;;
                  employee-service) container_name="gisul-employee-service" ;;
                esac
                
                if [ -n "$container_name" ] && docker ps --format "{{.Names}}" | grep -q "^${container_name}$"; then
                  echo "✅ $service is running"
                elif [ -n "$container_name" ]; then
                  echo "⚠️  $service is not running, checking logs..."
                  docker compose logs --tail=20 "$service" || true
                fi
              done
            fi
            
            echo "✅ QA deployment completed successfully!"
          EOF

