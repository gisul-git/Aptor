name: Build and Deploy Demo Service to Azure Container Apps

on:
  push:
    branches:
      - dev
    paths:
      - 'services/demo-service/**'
      - '.github/workflows/deploy-demo-service.yml'
  pull_request:
    types: [closed]
    branches:
      - dev
    paths:
      - 'services/demo-service/**'
  workflow_dispatch: # Allow manual triggering

env:
  AZURE_RESOURCE_GROUP: Aaptor
  CONTAINER_APP_NAME: demo-service
  DOCKER_IMAGE_NAME: demo-service
  SERVICE_PATH: services/demo-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Only run on push to dev, merged PRs, or manual dispatch
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: ${{ env.SERVICE_PATH }}/package-lock.json

      - name: Install dependencies
        working-directory: ./${{ env.SERVICE_PATH }}
        run: |
          npm ci

      - name: Build TypeScript
        working-directory: ./${{ env.SERVICE_PATH }}
        run: |
          npm run build

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure Container Apps extension
        run: |
          az extension add --name containerapp --upgrade

      - name: Login to Azure Container Registry
        run: |
          echo ${{ secrets.ACR_PASSWORD }} | docker login ${{ secrets.ACR_LOGIN_SERVER }} \
            -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build Docker image
        working-directory: ./${{ env.SERVICE_PATH }}
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} .
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:latest .

      - name: Push Docker image to ACR
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:latest

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

      - name: Verify deployment
        run: |
          echo "✅ Deployment completed successfully!"
          echo "📦 Image: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}"

