name: Build and Deploy Auth Service to Azure Container Apps

on:
  push:
    branches:
      - dev
    paths:
      - 'services/auth-service/**'
      - '.github/workflows/deploy-auth-service.yml'
  pull_request:
    types: [closed]
    branches:
      - dev
    paths:
      - 'services/auth-service/**'
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: Aaptor
  CONTAINER_APP_NAME: auth-service
  DOCKER_IMAGE_NAME: auth-service
  SERVICE_PATH: services/auth-service

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ${{ env.SERVICE_PATH }}/requirements.txt

      - name: Install dependencies
        working-directory: ./${{ env.SERVICE_PATH }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 🔐 Ensure containerapp CLI is available
      - name: Install Azure Container Apps extension
        run: |
          az extension add --name containerapp --upgrade

      # 🧪 Debug – confirm app exists
      - name: Debug – List Container Apps
        run: |
          az containerapp list \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[].name" -o table

      - name: Login to Azure Container Registry
        run: |
          echo ${{ secrets.ACR_PASSWORD }} | docker login ${{ secrets.ACR_LOGIN_SERVER }} \
            -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build Docker image
        working-directory: ./${{ env.SERVICE_PATH }}
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }} .
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:latest .

      - name: Push Docker image to ACR
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:latest

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}

      - name: Verify deployment
        run: |
          echo "✅ Deployment completed successfully!"
          echo "📦 Image: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}"
