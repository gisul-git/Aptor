name: Deploy API Gateway to QA (Debian VM)

on:
  push:
    branches:
      - QA
    paths:
      - 'services/api-gateway/**'
      - '.github/workflows/deploy-qa-api-gateway.yml'
  pull_request:
    types: [closed]
    branches:
      - QA
    paths:
      - 'services/api-gateway/**'
  workflow_dispatch:

env:
  VM_HOST: ${{ secrets.QA_VM_HOST }}
  VM_USER: ${{ secrets.QA_VM_USER }}
  VM_SSH_KEY: ${{ secrets.QA_VM_SSH_KEY }}
  VM_DEPLOY_PATH: ${{ secrets.QA_VM_DEPLOY_PATH }}

jobs:
  deploy-api-gateway-qa:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: QA

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy API Gateway to QA VM
        run: |
          DEPLOY_PATH="${{ env.VM_DEPLOY_PATH }}"
          if [ -z "$DEPLOY_PATH" ]; then
            DEPLOY_PATH="/opt/aptor"
          fi
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.VM_USER }}@${{ env.VM_HOST }} bash << EOF
            set -e
            
            echo "🚀 Starting API Gateway QA deployment..."
            
            # Navigate to deployment directory
            cd ${DEPLOY_PATH}
            
            # Pull latest code from QA branch
            echo "📥 Pulling latest code from QA branch..."
            git fetch origin
            git checkout QA
            git pull origin QA
            
            # Clean up existing container (including Created state)
            echo "🧹 Cleaning up existing API Gateway container..."
            if docker ps -a --format "{{.Names}}" | grep -q "^gisul-api-gateway$"; then
              echo "Removing existing container: gisul-api-gateway"
              docker stop gisul-api-gateway 2>/dev/null || true
              docker rm -f gisul-api-gateway 2>/dev/null || true
            fi
            
            # Rebuild and restart only API Gateway service
            echo "🔨 Rebuilding API Gateway..."
            docker-compose build api-gateway
            
            echo "🔄 Starting API Gateway..."
            docker-compose up -d --force-recreate --no-deps api-gateway
            
            # Wait for service to be ready
            echo "⏳ Waiting for API Gateway to be ready..."
            sleep 5
            
            # Verify service is running
            if docker-compose ps api-gateway | grep -q "Up"; then
              echo "✅ API Gateway deployed successfully!"
              docker-compose ps api-gateway
            else
              echo "❌ API Gateway deployment failed!"
              docker-compose logs api-gateway
              exit 1
            fi
          EOF

      - name: Verify Deployment
        run: |
          echo "✅ API Gateway deployment completed"
          echo "🌐 API Gateway available at: http://${{ env.VM_HOST }}:80"

