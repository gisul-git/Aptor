name: Deploy AIML Service to QA (Debian VM)

on:
  push:
    branches:
      - QA
    paths:
      - 'services/aiml-service/**'
      - '.github/workflows/deploy-qa-aiml-service.yml'
  pull_request:
    types: [closed]
    branches:
      - QA
    paths:
      - 'services/aiml-service/**'
  workflow_dispatch:

env:
  VM_HOST: ${{ secrets.QA_VM_HOST }}
  VM_USER: ${{ secrets.QA_VM_USER }}
  VM_SSH_KEY: ${{ secrets.QA_VM_SSH_KEY }}
  VM_DEPLOY_PATH: ${{ secrets.QA_VM_DEPLOY_PATH }}

jobs:
  deploy-aiml-service-qa:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: QA

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ env.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy AIML Service to QA VM
        run: |
          DEPLOY_PATH="${{ env.VM_DEPLOY_PATH }}"
          if [ -z "$DEPLOY_PATH" ]; then
            DEPLOY_PATH="/opt/aptor"
          fi
          
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ env.VM_USER }}@${{ env.VM_HOST }} bash << EOF
            set -e
            
            echo "🚀 Starting AIML Service QA deployment..."
            
            cd ${DEPLOY_PATH}
            git fetch origin
            git checkout QA
            git pull origin QA
            
            # Clean up existing container (including Created state)
            echo "🧹 Cleaning up existing AIML Service container..."
            if docker ps -a --format "{{.Names}}" | grep -q "^gisul-aiml-service$"; then
              echo "Removing existing container: gisul-aiml-service"
              docker stop gisul-aiml-service 2>/dev/null || true
              docker rm -f gisul-aiml-service 2>/dev/null || true
            fi
            
            echo "🔨 Rebuilding AIML Service..."
            docker-compose build aiml-service
            
            echo "🔄 Starting AIML Service..."
            docker-compose up -d --force-recreate --no-deps aiml-service
            
            sleep 5
            
            if docker-compose ps aiml-service | grep -q "Up"; then
              echo "✅ AIML Service deployed successfully!"
              docker-compose ps aiml-service
            else
              echo "❌ AIML Service deployment failed!"
              docker-compose logs aiml-service
              exit 1
            fi
          EOF

      - name: Verify Deployment
        run: |
          echo "✅ AIML Service deployment completed"

