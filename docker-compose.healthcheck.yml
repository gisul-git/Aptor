# Docker Compose Override with Health Checks
# This file adds health checks to all services for better deployment reliability
# 
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.healthcheck.yml up -d
#
# Or add to .env:
#   COMPOSE_FILE=docker-compose.yml:docker-compose.healthcheck.yml

version: '3.8'

services:
  redis:
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend:
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 40s

  api-gateway:
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 20s

