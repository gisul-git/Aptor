name: "cloud_playground_sandbox"
description: "AWS CLI Sandbox"

mode: ONCE
hostname: "sandbox"

time_limit: 20

rlimit_as: 4096
rlimit_cpu: 10
rlimit_fsize: 10

mount {
    src: "/bin"
    dst: "/bin"
    is_bind: true
}

mount {
    src: "/usr"
    dst: "/usr"
    is_bind: true
}

mount {
    src: "/lib"
    dst: "/lib"
    is_bind: true
}

mount {
    src: "/lib64"
    dst: "/lib64"
    is_bind: true
}

mount {
    src: "/etc"
    dst: "/etc"
    is_bind: true
}

mount {
    src: "/tmp"
    dst: "/tmp"
    is_bind: true
    rw: true
}
