name: "execution_jail"
mode: STANDALONE_ONCE
time_limit: 5

mount {
  src: "/bin"
  dst: "/bin"
  is_bind: true
}

mount {
  src: "/lib"
  dst: "/lib"
  is_bind: true
}

mount {
  src: "/lib64"
  dst: "/lib64"
  is_bind: true
}

mount {
  src: "/usr"
  dst: "/usr"
  is_bind: true
}

mount {
  dst: "/tmp"
  fstype: "tmpfs"
}
