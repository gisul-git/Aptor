<!DOCTYPE html>
<html>
<head>
    <title>Test Design Question Publish</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        button { padding: 10px 20px; margin: 10px; cursor: pointer; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Test Design Question Publish API</h1>
    
    <div>
        <button onclick="testGetQuestions()">1. Get Questions</button>
        <button onclick="testPublish()">2. Test Publish</button>
        <button onclick="testUnpublish()">3. Test Unpublish</button>
    </div>
    
    <div id="output"></div>
    
    <script>
        const API_URL = 'http://localhost:3007/api/v1/design';
        let testQuestionId = null;
        
        function log(message, isError = false) {
            const output = document.getElementById('output');
            const div = document.createElement('div');
            div.className = isError ? 'error' : 'success';
            div.innerHTML = message;
            output.appendChild(div);
        }
        
        async function testGetQuestions() {
            document.getElementById('output').innerHTML = '';
            log('Fetching questions...');
            
            try {
                const response = await fetch(`${API_URL}/questions`);
                const data = await response.json();
                
                log(`✅ Found ${data.length} questions`);
                
                if (data.length > 0) {
                    testQuestionId = data[0].id || data[0]._id;
                    const question = data[0];
                    log(`<pre>First Question:\nID: ${testQuestionId}\nTitle: ${question.title}\nPublished: ${question.is_published}</pre>`);
                    
                    // Count published vs draft
                    const published = data.filter(q => q.is_published).length;
                    const draft = data.length - published;
                    log(`Published: ${published}, Draft: ${draft}`);
                }
            } catch (error) {
                log(`❌ Error: ${error.message}`, true);
            }
        }
        
        async function testPublish() {
            if (!testQuestionId) {
                log('❌ Please run "Get Questions" first', true);
                return;
            }
            
            log(`Publishing question ${testQuestionId}...`);
            
            try {
                const response = await fetch(`${API_URL}/questions/${testQuestionId}/publish?is_published=true`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${await response.text()}`);
                }
                
                const result = await response.json();
                log(`✅ Success: ${result.message}`);
                log(`<pre>${JSON.stringify(result, null, 2)}</pre>`);
            } catch (error) {
                log(`❌ Error: ${error.message}`, true);
            }
        }
        
        async function testUnpublish() {
            if (!testQuestionId) {
                log('❌ Please run "Get Questions" first', true);
                return;
            }
            
            log(`Unpublishing question ${testQuestionId}...`);
            
            try {
                const response = await fetch(`${API_URL}/questions/${testQuestionId}/publish?is_published=false`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${await response.text()}`);
                }
                
                const result = await response.json();
                log(`✅ Success: ${result.message}`);
                log(`<pre>${JSON.stringify(result, null, 2)}</pre>`);
            } catch (error) {
                log(`❌ Error: ${error.message}`, true);
            }
        }
    </script>
</body>
</html>
