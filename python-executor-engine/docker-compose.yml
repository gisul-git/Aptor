version: '3.8'

services:
  # FastAPI application service
  python-executor-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python-executor-api
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock  # Mount Docker socket for Docker-in-Docker
    depends_on:
      - python-executor-image
    restart: unless-stopped
    networks:
      - executor-network

  # Build the Python execution image (used by the API)
  python-executor-image:
    build:
      context: ./docker_images/python
      dockerfile: Dockerfile
    image: code-exec-python:3.11
    container_name: python-executor-builder
    # This service just builds the image, doesn't run
    command: /bin/true

networks:
  executor-network:
    driver: bridge

