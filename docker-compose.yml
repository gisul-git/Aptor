version: "3.8"

networks:
  microservices-network:
    driver: bridge

volumes:
  mongo_data:
  postgres_data:
  redis_data:
  minio_data:
  penpot_assets_data:

services:

  # ===========================
  # INFRASTRUCTURE SERVICES
  # ===========================

  mongo:
    image: mongo:7.0
    restart: always
    networks:
      - microservices-network
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ai_assessment
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    restart: always
    networks:
      - microservices-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_INITDB_ARGS: "--data-checksums"
      POSTGRES_DB: penpot
      POSTGRES_USER: penpot
      POSTGRES_PASSWORD: penpot
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penpot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - microservices-network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: always
    networks:
      - microservices-network
    ports:
      - "9000:9000"
      - "9090:9090"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ===========================
  # PENPOT SERVICES
  # ===========================

  penpot-backend:
    image: penpotapp/backend:latest
    restart: always
    networks:
      - microservices-network
    volumes:
      - penpot_assets_data:/opt/data/assets
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PENPOT_FLAGS: "enable-registration enable-login-with-password disable-email-verification"
      PENPOT_DATABASE_URI: "postgresql://postgres/penpot"
      PENPOT_DATABASE_USERNAME: "penpot"
      PENPOT_DATABASE_PASSWORD: "penpot"
      PENPOT_REDIS_URI: "redis://redis/0"
      PENPOT_ASSETS_STORAGE_BACKEND: "assets-fs"
      PENPOT_STORAGE_ASSETS_FS_DIRECTORY: "/opt/data/assets"
      PENPOT_TELEMETRY_ENABLED: "false"
      PENPOT_PUBLIC_URI: "http://localhost:9001"
      PENPOT_SECRET_KEY: "super-secret-penpot-key"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6060/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  penpot-exporter:
    image: penpotapp/exporter:latest
    restart: always
    networks:
      - microservices-network
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PENPOT_PUBLIC_URI: "http://localhost:9001"
      PENPOT_REDIS_URI: "redis://redis/0"
      PENPOT_SECRET_KEY: "super-secret-penpot-key"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6061/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  penpot-frontend:
    image: penpotapp/frontend:latest
    restart: always
    networks:
      - microservices-network
    depends_on:
      penpot-backend:
        condition: service_healthy
      penpot-exporter:
        condition: service_started
    environment:
      PENPOT_FLAGS: "enable-registration enable-login-with-password"
    ports:
      - "9001:8080"
    healthcheck:
      test: ["CMD", "true"]

  # ===========================
  # YOUR DESIGN SERVICE (FIXED)
  # ===========================

  design-service:
    build: ./services/design-service
    restart: always
    networks:
      - microservices-network
    ports:
      - "3006:3006"
    volumes:
      - ./services/design-service:/app
    environment:
      # Penpot API - backend direct (Docker network)
      PENPOT_API_URL: "http://penpot-backend:6060"
      PENPOT_PUBLIC_URI: "http://localhost:9001"
      # Use your Penpot admin email and password (from registration)
      PENPOT_ADMIN_EMAIL: "${PENPOT_ADMIN_EMAIL:-admin@penpot.local}"
      PENPOT_ADMIN_PASSWORD: "${PENPOT_ADMIN_PASSWORD:-admin123}"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      penpot-backend:
        condition: service_healthy
      penpot-frontend:
        condition: service_started