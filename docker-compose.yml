services:

  redis:
    image: redis:7-alpine
    container_name: gisul-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - microservices-network
    restart: unless-stopped


  frontend:
    image: gisul/gisul-frontend:latest
    container_name: gisul-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NEXTAUTH_URL=${NEXTAUTH_URL:-https://qa.aaptor.com}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      # Remove NEXT_PUBLIC_API_URL to use relative URLs (same origin)
      # This ensures browser requests go through Next.js proxy to API Gateway
      # - NEXT_PUBLIC_API_URL=https://qa.aaptor.com
      - API_GATEWAY_URL=http://api-gateway:80
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - AZURE_AD_CLIENT_ID=${AZURE_AD_CLIENT_ID}
      - AZURE_AD_CLIENT_SECRET=${AZURE_AD_CLIENT_SECRET}
      - AZURE_AD_TENANT_ID=${AZURE_AD_TENANT_ID:-common}
    depends_on:
      - api-gateway
    networks:
      - microservices-network
    restart: unless-stopped


  api-gateway:
    image: gisul/gisul-api-gateway:latest
    container_name: gisul-api-gateway
    ports:
      - "80:80"
    environment:
      - PORT=80
      - AUTH_SERVICE_URL=http://auth-service:4000
      - AI_ASSESSMENT_SERVICE_URL=http://ai-assessment-service:3001
      - CUSTOM_MCQ_SERVICE_URL=http://custom-mcq-service:3002
      - AIML_SERVICE_URL=http://aiml-service:3003
      - DSA_SERVICE_URL=http://dsa-service:3004
      - PROCTORING_SERVICE_URL=http://proctoring-service:3005
      - SUPER_ADMIN_SERVICE_URL=http://super-admin-service:3006
      - DEMO_SERVICE_URL=http://demo-service:3008
      - EMPLOYEE_SERVICE_URL=http://employee-service:4005
    depends_on:
      - auth-service
    networks:
      - microservices-network
    restart: unless-stopped


  auth-service:
    image: gisul/gisul-auth-service:latest
    container_name: gisul-auth-service
    ports:
      - "4000:4000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=auth_db
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - microservices-network
    restart: unless-stopped


  ai-assessment-service:
    image: gisul/gisul-ai-assessment-service:latest
    container_name: gisul-ai-assessment-service
    ports:
      - "3001:3001"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=ai_assessment_db
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL_SUMMARY=${GEMINI_MODEL_SUMMARY}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - SENDGRID_FROM_NAME=${SENDGRID_FROM_NAME}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - redis
    networks:
      - microservices-network
    restart: unless-stopped


  custom-mcq-service:
    image: gisul/gisul-custom-mcq-service:latest
    container_name: gisul-custom-mcq-service
    ports:
      - "3002:3002"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=custom_mcq_db
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379/0
      - EMAIL_PROVIDER=${EMAIL_PROVIDER}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - redis
    networks:
      - microservices-network
    restart: unless-stopped


  aiml-service:
    image: gisul/gisul-aiml-service:latest
    container_name: gisul-aiml-service
    ports:
      - "3003:3003"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=aiml_db
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379/0
      - EMAIL_PROVIDER=${EMAIL_PROVIDER}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - redis
      - aiml-agent-service
    networks:
      - microservices-network
    restart: unless-stopped


  aiml-agent-service:
    image: gisul/gisul-aiml-agent-service:latest
    container_name: gisul-aiml-agent-service
    ports:
      - "8889:8889"
      - "8080:8080"
    volumes:
      - aiml_agent_uploads:/app/agent/uploads
    networks:
      - microservices-network
    restart: unless-stopped


  dsa-service:
    image: gisul/gisul-dsa-service:latest
    container_name: gisul-dsa-service
    ports:
      - "3004:3004"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=dsa_db
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JUDGE0_URL=${JUDGE0_URL}
      - JUDGE0_API_KEY=${JUDGE0_API_KEY}
      - EMAIL_PROVIDER=${EMAIL_PROVIDER}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - redis
    networks:
      - microservices-network
    restart: unless-stopped


  proctoring-service:
    image: gisul/gisul-proctoring-service:latest
    container_name: gisul-proctoring-service
    ports:
      - "3005:3005"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=proctoring_db
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379/0
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - redis
    networks:
      - microservices-network
    restart: unless-stopped


  super-admin-service:
    image: gisul/gisul-super-admin-service:latest
    container_name: gisul-super-admin-service
    ports:
      - "3006:3006"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=super_admin_db
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379/0
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - redis
    networks:
      - microservices-network
    restart: unless-stopped


  employee-service:
    image: gisul/gisul-employee-service:latest
    container_name: gisul-employee-service
    ports:
      - "4005:4005"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=employee_db
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379/0
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - redis
    networks:
      - microservices-network
    restart: unless-stopped


  demo-service:
    image: gisul/gisul-demo-service:latest
    container_name: gisul-demo-service
    ports:
      - "3008:3008"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB=demo_db
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379/0
      - EMAIL_PROVIDER=${EMAIL_PROVIDER}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - NOTIFICATION_EMAIL=${NOTIFICATION_EMAIL}
      - FRONTEND_URL=${FRONTEND_URL}
    depends_on:
      - redis
    networks:
      - microservices-network
    restart: unless-stopped


volumes:
  redis_data:
  aiml_agent_uploads:

networks:
  microservices-network:
    driver: bridge